<style>

  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px}
  header{padding:20px 24px 14px;border-bottom:1px solid var(--line)}
  header h1{margin:0;font-size:19px;font-weight:700}
  header .sub{color:var(--muted);font-size:12.5px;margin-top:4px}
  .layout{display:flex;align-items:flex-start}
  .tabs{width:196px;min-width:196px;padding:12px 8px 40px;border-right:1px solid var(--line);position:sticky;top:0;max-height:100vh;overflow-y:auto;box-sizing:border-box}
  .navgrp{display:flex;align-items:center;gap:8px;padding:9px 10px;margin-top:6px;color:var(--txt);font-weight:800;font-size:12.5px;letter-spacing:.3px;cursor:pointer;text-transform:uppercase}
  .navgrp span{color:var(--muted);font-size:11px;width:10px}
  .navgrp2{padding:9px 10px;margin-top:12px;color:var(--muted);font-weight:700;font-size:10.5px;letter-spacing:.4px;text-transform:uppercase;border-top:1px solid var(--line)}
  .tab{display:block;padding:7px 12px 7px 28px;border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;border:none;font-weight:600;font-size:12.5px;margin:1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tab:hover{background:var(--panel)}
  .tab.active{background:var(--panel2);color:var(--txt);border-left:3px solid #3b82f6;padding-left:25px}
  .wrap{flex:1;min-width:0;padding:18px 24px 60px}
  .notice{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.4);color:#fcd34d;padding:10px 14px;border-radius:10px;margin-bottom:12px;font-size:13px;line-height:1.5}
  .notice.blue{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.35);color:#93c5fd}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin:16px 0 20px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .kpi .lab{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px}

  .kpi .sub{font-size:11.5px;color:var(--muted);margin-top:3px}
  .pos{color:var(--green)}.neg{color:var(--red)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}

  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{padding:7px 8px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
  th:first-child,td:first-child{text-align:left;white-space:normal}
  th{color:var(--muted);font-weight:600;font-size:10.5px;text-transform:uppercase;position:sticky;top:0;background:var(--panel)}
  tr.total td{font-weight:700;border-top:2px solid var(--line);background:var(--panel2)}
  tr.zero td{opacity:.55}
  .scroll{overflow-x:auto;max-height:580px;overflow-y:auto}
  .badge{display:inline-block;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:700}
  .b-green{background:rgba(34,197,94,.15);color:var(--green)}
  .b-red{background:rgba(239,68,68,.15);color:var(--red)}
  .muted{color:var(--muted)}.full{grid-column:1/-1}
  .heatwrap{overflow:auto;max-height:78vh;border:1px solid var(--line);border-radius:12px}
  table.heat{border-collapse:separate;border-spacing:0;font-size:12px;width:100%}
  table.heat th{position:sticky;top:0;z-index:2;background:var(--panel2);color:var(--muted);font-weight:600;
    padding:8px 6px;text-align:right;font-size:11px}
  table th:first-child{text-align:left}
  table.heat th.hcorner{left:0;z-index:3;text-align:left;min-width:230px}
  table.heat td.hname{position:sticky;left:0;z-index:1;background:var(--panel);text-align:left;
    padding:6px 10px;min-width:230px;max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    border-bottom:1px solid var(--line);font-size:11.5px}
  table.heat td.hcell{text-align:center;padding:6px 8px;font-weight:600;min-width:52px;border-bottom:1px solid rgba(0,0,0,.25)}
  table.heat th.hmonth,table.heat td.hmonth{border-left:2px solid var(--line)}
  .legend{display:flex;align-items:center;gap:6px;justify-content:center;margin-top:12px;color:var(--muted);font-size:12px}
  .legend .lg{width:26px;height:14px;border-radius:3px;display:inline-block}

.acoes-panel{background:#121926;border:1px solid rgba(255,255,255,.07);border-radius:14px;overflow:hidden;margin-bottom:16px}

@media(max-width:720px){.acoes-tbl .hidem{display:none}}

.cctr{text-align:center !important}

,{"date":"11/07","text":"Camila (0184) — duplicada + idade ampliada p/ 35-65+ (MESMO criativo). Estava PAUSADA (R$0 em 11-12/07); ATIVADA em 12/07 — acompanhar a partir de agora. RPM 1520 (pagina ok); se nao melhorar, trocar criativo."},{"date":"11/07","text":"TESTE de escala: barra de Escalar baixada p/ 40% (era 50). Escalar quem tiver ROI>=40% nos 3 dias. Se as escaladas nao segurarem (cair p/ <25% ou negativo em 2-3 dias apos aumentar budget), subir a barra p/ 50%."},{"date":"11/07","text":"11-ENG (CAMP11 direto) — ESCALADA de ~R$20 para R$26/dia (+30%, vertical, mesmo publico). Motivo: ROI +47% nos 3 dias, gastava pouco. Acompanhar se segura >=40% apos o aumento."},{"date":"11/07","text":"11-ENG direto — enxugada de 20 p/ 6 conjuntos (pausados os zumbis de 1 impressao). Motor: CJ15(R$0,96) CJ06(R$2,63,+volume) CJ13 CJ11. Caros p/ vigiar: CJ01(R$5,84) CJ14(R$4,10). Orcamento subiu p/ R$32/dia (min possivel com 6 conj). Se seguirem em 'aprendizado limitado', enxugar p/ 3-4."},{"date":"12/07","text":"7090 (01-EUA-CP) — ESCALADA +20% p/ R$103/dia. Motivo: recuperou (dias 67/8/78), media +52%. Acompanhar se segura >=40%."},{"date":"12/07","text":"9319 Sharon — ESCALADA p/ R$115/dia. Media +48%, terminou +77%, RPM otimo (1495). Ja gastava muito; vigiar se o volume extra nao dilui o ROI."},{"date":"14/07","text":"Sharon (9319) escalada R$115→R$150 (Meta sugeria R$194 — recusado, escala gradual)."},{"date":"14/07","text":"Helen (9013) pausada e duplicada V2: criativo novo + idade 25-54, R$40-50/dia. Vigiar RPM vs ~1500 (se cair, 65+ era quem monetizava → v3 45+)."},{"date":"14/07","text":"Carolyn (1847) pausada no CAN (3 fechados neg, RPM 754 = mercado ruim) e reaproveitada: 23-RELAC-ESP-1847 - V2 ativa (Espanha, mesmo criativo, R$40-50/dia, conteudo ES). Camila V2 e Martina V2 fecham janela hoje — se negativo, trocar criativo (RPM bom, fadiga de criativo)."},{"date":"14/07","text":"9045 reativada R$40: dia 13 -99% suspeito (atraso de atribuição). Leitura real 14-16. UK-1758 Pamela: estreia +20%, RPM 1300-1960 — playbook UK validando. ESP 5020/2610: se dia 14 fechar forte, escalar amanhã."},{"date":"14/07","text":"Noite: Martina V2 reduzida R$100→R$51,60 (sangria, 3o dia neg — amanha pausa + criativo novo). Pamela UK ficou nos R$100 (acidente na duplicacao; segurou breakeven com dobro do budget = pagina absorve volume). Amanha cedo: escalar ESP 5020/2610 +20-30% (~R$65), decidir Camila V2 (criativo novo?), Donna V2 em alerta, 9045 conferir utm/link."},{"date":"15/07","text":"TESTE AGRESSIVO (decisao do Tiago, ciente do risco de canibalizacao): Sharon duplicada = 2x R$150 (R$300/dia). ESP 5020 e 2610: originais a R$100 + 4 duplicatas de R$50 cada = R$300/pagina/dia. Avaliar dia 15 fechado: ROI/RPM agregado por pagina vs dia 14 (ESP ~+250/290% RPM ~1100; Sharon +78%). Se RPM cair forte = saturacao; CPM subir = canibalizacao. Corte: duplicata negativa com CPM > original."},{"date":"15/07","text":"13-RELAC-LUX-3706-Michelle Harper ESCALADA ~R$50→R$100/dia (+165% no dia 14 fechado, +80% na parcial de 15). Tambem em 15/07: Martina V2 e Camila V2 ganharam 1 dia de excecao (parciais positivas apos 3 fechados neg; Camila com BROAD saltando p/ R$19). Duplicatas ESP 5020/2610 mantidas +1 dia por decisao do Tiago (parcial neg, criterio: fechar positivo ou encerra). 9045: reforma — pausar conjuntos limitados, manter o bom + duplicata com criativo novo (janela reinicia)."},{"date":"15/07","text":"12-APP-RELAC-IRL-0204-Laura Bennett REATIVADA (Tiago) apos pico de BROAD sem gasto no dia 15 (R$34, 56 imp). Historico pago fraco (4d, -25%, RPM 1126). Janela de 3 dias a partir de 16/07. Investigar origem do trafego organico do dia 15."},{"date":"16/07","text":"2h48: Karen (0785) e Javiera (5399) reaproveitadas p/ UK: 35-RELAC-UK-0785-KarenWhitfield e 36-RELAC-UK-5399-JavieraSoto (renomeada, era 35 duplicado). Ambas conteudo INGLES (Javiera so o nome da persona e hispano) — playbook Pamela nas duas. Karen com 10 conjuntos: risco de aprendizado limitado, enxugar p/ 2-3. Janela 16-18/07; RPM <~1300 = falha no 2o pais = aposenta."},{"date":"16/07","text":"REVISAO DE REGRAS (criativos sao os mesmos em praticamente todas as campanhas): ROI ruim + RPM bom = PUBLICO saturado/ruim, nao criativo — remedio: resetar publico (pais novo, pausa longa p/ esfriar, ou segmentacao nova). ROI ruim + RPM baixo = pagina ruim NAQUELE pais — testar 2o pais; falhou em 2 = aposenta. Decaimento apos epoca boa = fadiga do pool. Portfolio = rodizio de paginas por mercados (EUA→UK/NL/ESP→descanso). Camila: 37-RELAC-NL-0184-CamilaGonzalez ATIVA (Holanda, criativo atual, publico virgem — 1a pagina da 4a frente NL). V2 dos EUA deve ficar PAUSADA (mesmo ID 0184). Janela 16-18/07."},{"date":"16/07","text":"FRENTE CAN-ES FECHADA (0 de 4 funcionou): 17-RELAC-CAN-ES-3987-KellyEvans e 18-RELAC-CAN-ES-9013-HelenBailey - V2 pausadas pelo Tiago. Amanha decidir pais de reaproveitamento das duas paginas (conteudo ES? conferir). 05-RELAC-EUA-0184-CamilaGonzalez - V2 pausada (NL ativa no lugar)."},{"date":"16/07","text":"FUNIL (Tiago): anuncio → contato Messenger → disparos → site → AdImpression (conversao). KPIs complementares: custo/contato (combustivel) + custo/AdImpression (saida). PROBLEMA ATIVO: disparos pos-janela de 24h falhando em ALGUMAS paginas (mudanca da Meta) — lead vira estoque perecivel onde nao dispara. Paginas com receita sem gasto = disparo vivo (Pamela, Laura, CMX). DECISAO TIAGO: duplicatas ESP (todas as 8) rodam 3 dias fechados (15-17/07), veredito 18/07. Criterios: lucro/dia da pagina vs dia 14 (Dorothy ~R$170, Kathleen ~R$156), ROI 3d, contatos/dia (ref 4-10), custo/AdImpression por V (ref original ~R$0,99)."},{"date":"17/07","text":"Laura (0204/Irlanda) — ESCALADA de R$50 para R$65/dia (+30%). Motivo: 3 dias de ROI positivo, RPM 1586, parcial de hoje +67%. Acompanhar se segura no orcamento novo."},{"date":"17/07","text":"Linda (7742/EUA) — ESCALADA de R$100 para R$130/dia (+30%). Motivo: ROI subindo (+13/+43/+90), RPM 1698. Maior s      <div class="scroll"><table><thead><tr>${dtHead}</tr></thead><tbody>${rows}${totalRow}</tbody></table></div></div>

     <div class="card"><h3>CAP × BROAD — receita empilhada</h3><div class="chart-box"><canvas id="cbChart"></canvas></div></div>
     <div class="card"><h3>CAP × BROAD — tabela</h3><div class="scroll" style="max-height:420px"><table>
       <thead><tr><th>Campanha</th><th>ID</th><th>Gasto FB</th><th>CAP</th><th>BROAD</th><th>Total</th><th>Split %</th></tr></thead>
       <tbody>${cbRows}${cbTotal}</tbody></table></div></div>
   </div>` + (d.direct ? directSection(d) : '');

  if(d.direct){ buildDirectChart(d); }
  const gridC='#2a3550',tickC='#94a3b8';
  const base={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:tickC}}},
    scales:{x:{ticks:{color:tickC,maxRotation:90,minRotation:90,font:{size:9}},grid:{color:gridC}},y:{ticks:{color:tickC},grid:{color:gridC}}}};
  const roiS=[...d.campaigns].sort((a,b)=>b.roi-a.roi);
  charts.push(new Chart(roiChart,{type:'bar',data:{labels:roiS.map(c=>c.id),
    datasets:[{label:'ROI %',data:roiS.map(c=>c.roi),backgroundColor:roiS.map(c=>c.roi>=0?'#22c55e':'#ef4444')}]},
    options:{...base,plugins:{legend:{display:false},tooltip:{callbacks:{title:i=>roiS[i[0].dataIndex].name,label:x=>'ROI: '+pct(x.raw)}}}}}));
  const cg=[...d.campaigns].sort((a,b)=>b.ganho_adj-a.ganho_adj);
  charts.push(new Chart(cgChart,{type:'bar',data:{labels:cg.map(c=>c.id),
    datasets:[{label:'Custo +13%',data:cg.map(c=>c.custo_adj),backgroundColor:'#ef4444'},
              {label:'Ganho −10%',data:cg.map(c=>c.ganho_adj),backgroundColor:'#22c55e'}]},
    options:{...base,plugins:{...base.plugins,tooltip:{callbacks:{title:i=>cg[i[0].dataIndex].name,label:x=>x.dataset.label+': '+brl(x.raw)}}}}}));
  const cb=[...d.campaigns].sort((a,b)=>(b.cap_rev+b.broad_rev)-(a.cap_rev+a.broad_rev));
  charts.push(new Chart(cbChart,{type:'bar',data:{labels:cb.map(c=>c.id),
    datasets:[{label:'CAP',data:cb.map(c=>c.cap_rev),backgroundColor:'#3b82f6'},
              {label:'BROAD',data:cb.map(c=>c.broad_rev),backgroundColor:'#a855f7'}]},
    options:{...base,scales:{x:{stacked:true,ticks:{color:tickC,maxRotation:90,minRotation:90,font:{size:9}},grid:{color:gridC}},
      y:{stacked:true,ticks:{color:tickC},grid:{color:gridC}}},
      plugins:{...base.plugins,tooltip:{callbacks:{title:i=>cb[i[0].dataIndex].name,label:x=>x.dataset.label+': '+brl(x.raw)}}}}}));
}
const tabsEl=document.getElementById('tabs');
const monthName={'2026-06':'Junho','2026-07':'Julho','2026-08':'Agosto','2026-09':'Setembro'};
const dayTabs=[],special=[];
DASHBOARD.days.forEach((d,i)=>{ (d.is_monthly||d.is_heatmap||d.is_country||d.is_adsets||d.is_actions?special:dayTabs).push({d,i}); });
const groups={};
dayTabs.forEach(o=>{const mk=String(o.d.id).slice(0,7); (groups[mk]=groups[mk]||[]).push(o);});
const monthKeys=Object.keys(groups).sort();
const collapsed={};
monthKeys.forEach((mk,gi)=>{collapsed[mk]= gi<monthKeys.length-1;});
window.buildSidebar=function(){
  const cur=window._curIdx;
  tabsEl.innerHTML='';
  monthKeys.forEach(mk=>{
    const hdr=document.createElement('div'); hdr.className='navgrp';
    hdr.innerHTML='<span>'+(collapsed[mk]?'▸':'▾')+'</span> '+(monthName[mk]||mk);
    hdr.onclick=()=>{collapsed[mk]=!collapsed[mk]; window.buildSidebar();};
    tabsEl.appendChild(hdr);
    if(!collapsed[mk]){
      groups[mk].forEach(o=>{ const b=document.createElement('div'); b.className='tab'+(o.i===cur?' active':''); b.innerHTML=o.d.label+(o.d.partial?' <span style="color:#f2c14e;font-size:9.5px;font-weight:700">parcial</span>':''); b.onclick=()=>render(o.i); tabsEl.appendChild(b); });
    }
  });
  const sh=document.createElement('div'); sh.className='navgrp2'; sh.textContent='Resumos'; tabsEl.appendChild(sh);
  special.forEach(o=>{
    if(o.d.is_heatmap){
      const open=window._histOpen!==false;
      const hd=document.createElement('div'); hd.className='tab'+(o.i===cur?' active':'');
      hd.innerHTML='<span style="display:inline-block;width:12px">'+(open?'▾':'▸')+'</span> '+o.d.label;
      hd.onclick=()=>{ window._histOpen=!open; window.buildSidebar(); };
      tabsEl.appendChild(hd);
      if(open){ [['all','Todos'],['06','Junho'],['07','Julho']].forEach(m=>{
        const s=document.createElement('div'); const act=(o.i===cur)&&((window.heatMonth||'all')===m[0]);
        s.className='tab'+(act?' active':''); s.style.paddingLeft='34px'; s.style.fontSize='12.5px'; s.textContent=m[1];
        s.onclick=()=>{ window.heatMonth=m[0]; render(o.i); };
        tabsEl.appendChild(s); }); }
      return;
    }
    const b=document.createElement('div'); b.className='tab'+(o.i===cur?' active':''); b.textContent=o.d.label; b.onclick=()=>render(o.i); tabsEl.appendChild(b);
  });
};
const _lastDay = dayTabs.length? dayTabs[dayTabs.length-1].i : DASHBOARD.days.length-1;
render(_lastDay);
</script>
</body></html>
