  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px}
  header{padding:20px 24px 14px;border-bottom:1px solid var(--line)}
  header h1{margin:0;font-size:19px;font-weight:700}
  header .sub{color:var(--muted);font-size:12.5px;margin-top:4px}
  .tabs{display:flex;gap:6px;padding:14px 24px 0;flex-wrap:wrap}
  .tab{padding:8px 16px;border-radius:8px 8px 0 0;background:var(--panel);color:var(--muted);cursor:pointer;
    border:1px solid var(--line);border-bottom:none;font-weight:600;font-size:13px}
  .tab.active{background:var(--panel2);color:var(--txt)}
  .wrap{padding:18px 24px 60px}

  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .kpi .lab{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  .kpi .val{font-size:22px;font-weight:700;margin-top:6px}
  .kpi .sub{font-size:11.5px;color:var(--muted);margin-top:3px}
  .pos{color:var(--green)}.neg{color:var(--red)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
  @media(max-width:900px){.grid2{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  .card h3{margin:0 0 12px;font-size:14px;font-weight:700}
  .chart-box{position:relative;height:420px}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{padding:7px 8px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
  th:first-child,td:first-child{text-align:left;white-space:normal}
  th{color:var(--muted);font-weight:600;font-size:10.5px;text-transform:uppercase;position:sticky;top:0;background:var(--panel)}
  tr.total td{font-weight:700;border-top:2px solid var(--line);background:var(--panel2)}
  tr.zero td{opacity:.55}
  .scroll{overflow-x:auto;max-height:580px;overflow-y:auto}
  .badge{display:inline-block;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:700}
  .b-green{background:rgba(34,197,94,.15);color:var(--green)}
  .b-red{background:rgba(239,68,68,.15);color:var(--red)}
  .muted{color:var(--muted)}.full{grid-column:1/-1}
  .heatwrap{overflow:auto;max-height:78vh;border:1px solid var(--line);border-radius:12px}
  table.heat{border-collapse:separate;border-spacing:0;font-size:12px;width:100%}
  table.heat th{position:sticky;top:0;z-index:2;background:var(--panel2);color:var(--muted);font-weight:600;
    padding:8px 6px;text-align:center;font-size:11px}
  table.heat th.hcorner{left:0;z-index:3;text-align:left;min-width:230px}
  table.heat td.hname{position:sticky;left:0;z-index:1;background:var(--panel);text-align:left;
    padding:6px 10px;min-width:230px;max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    border-bottom:1px solid var(--line);font-size:11.5px}
  table.heat td.hcell{text-align:center;padding:6px 8px;font-weight:600;min-width:52px;border-bottom:1px solid rgba(0,0,0,.25)}
  table.heat th.hmonth,table.heat td.hmonth{border-left:2px solid var(--line)}
  .legend{display:flex;align-items:center;gap:6px;justify-content:center;margin-top:12px;color:var(--muted);font-size:12px}
  .legend .lg{width:26px;height:14px;border-radius:3px;display:inline-block}
</style>

function roiColor(v){

  window._adsetDay=d;
  const idx=Math.min(window._adsetCamp, d.campaigns.length-1);
  const cmp=d.campaigns[idx], t=cmp.totals;
  const opts=d.campaigns.map((c,i)=>`<option value="${i}"${i===idx?' selected':''}>${c.name} — ROI ${pct(c.totals.roi)} (${c.totals.n_total} conj.)</option>`).join('');
  const roiCls=(t.roi===null)?'':(t.roi>=0?'pos':'neg'), lucroCls=t.lucro>=0?'pos':'neg';
  const stMap={scale:['↑ Escalar','#1f9d57'],pause:['⏸ Pausar (Onda 1)','#e0625e'],
    wave2:['⚠ Avaliar (Onda 2)','#f2c14e'],observe:['— Observar','#94a3b8'],
    keep:['✓ Manter','#7dd3a0'],low:['· dados insuf.','#5b6b85']};
  const rowsH=cmp.sets.map(r=>{
    const c=roiColor(r.roi); const lc=r.lucro>=0?'pos':'neg';
    const st=stMap[r.status]||stMap.low;
    const dim=r.status==='pause'?'opacity:.55':'';
    return `<tr style="${dim}">
      <td>${cmp.name.split(' · ')[0]} · ${r.code}</td>
      <td>${brl(r.spend)}</td><td>${brl(r.rev)}</td>
      <td>${brl(r.custo_adj)}</td><td>${brl(r.ganho_adj)}</td>
      <td class="${lc}">${brl(r.lucro)}</td>
      <td style="background:${c.bg};color:${c.fg};font-weight:700;text-align:center">${c.txt}</td>
      <td style="color:${st[1]};font-weight:600;white-space:nowrap">${st[0]}</td></tr>`;}).join('');
  const totalRow=`<tr class="total"><td>TOTAL (${t.n_total})</td>
      <td>${brl(t.spend)}</td><td>${brl(t.rev)}</td><td>${brl(t.custo_adj)}</td><td>${brl(t.ganho_adj)}</td>
      <td class="${lucroCls}">${brl(t.lucro)}</td><td style="text-align:center">${pct(t.roi)}</td><td></td></tr>`;
  document.getElementById('wrap').innerHTML=`
    <div class="notice blue">🧩 <b>Conjuntos por campanha (Tráfego Direto)</b> — ROI real por conjunto (C-code), período <b>${d.period}</b>. Custo +13% / Ganho −10%. Ação sugerida automática: escalar (ROI&gt;50%), manter (0–50%), observar (negativo leve), pausar Onda 1 (ROI&lt;−40% e gasto pequeno), avaliar Onda 2 (negativo e &gt;15% do budget).</div>
    <div style="margin:0 0 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <label style="color:var(--muted);font-size:13px">Campanha:</label>
      <select onchange="setAdsetCampaign(this.value)" style="background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer;min-width:320px">${opts}</select>
    </div>
    <div class="kpis">
      <div class="kpi"><div class="lab">Gasto (bruto)</div><div class="val">${brl(t.spend)}</div><div class="sub">Custo +13%: ${brl(t.custo_adj)}</div></div>
      <div class="kpi"><div class="lab">Receita (bruta)</div><div class="val">${brl(t.rev)}</div><div class="sub">Ganho −10%: ${brl(t.ganho_adj)}</div></div>
      <div class="kpi"><div class="lab">Lucro</div><div class="val ${lucroCls}">${brl(t.lucro)}</div></div>
      <div class="kpi"><div class="lab">ROI</div><div class="val ${roiCls}">${pct(t.roi)}</div></div>
      <div class="kpi"><div class="lab">Sugestão: pausar</div><div class="val">${t.n_pause}</div><div class="sub">↑ escalar: ${t.n_scale}</div></div>
      <div class="kpi"><div class="lab">Projeção s/ Onda 1</div><div class="val ${(t.proj_roi>=0)?'pos':'neg'}">${pct(t.proj_roi)}</div><div class="sub">lucro ${brl(t.proj_lucro)}</div></div>
    </div>
    <div class="grid2">
      <div class="card"><h3>ROI por conjunto (%)</h3><div class="chart-box"><canvas id="adsetChart"></canvas></div></div>
      <div class="card"><h3>Conjuntos — ${cmp.name}</h3><div class="scroll" style="max-height:520px"><table>
        <thead><tr><th>Conjunto</th><th>Gasto</th><th>Receita</th><th>Custo +13%</th><th>Ganho −10%</th><th>Lucro</th><th>ROI</th><th>Ação sugerida</th></tr></thead>
        <tbody>${rowsH}${totalRow}</tbody></table></div></div>
    </div>`;
  const tickC='#94a3b8',gridC='#2a3550';
  const s=[...cmp.sets].filter(r=>r.roi!==null).sort((a,b)=>b.roi-a.roi);
  charts.push(new Chart(document.getElementById('adsetChart'),{type:'bar',
    data:{labels:s.map(r=>r.code),datasets:[{label:'ROI %',data:s.map(r=>r.roi),
      backgroundColor:s.map(r=>(r.roi<0?'#e0625e':(r.roi<=50?'#f2c14e':'#1f9d57')))}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
      tooltip:{callbacks:{label:x=>'ROI: '+pct(x.raw)}}},
      scales:{x:{ticks:{color:tickC,font:{size:9}},grid:{color:gridC}},y:{ticks:{color:tickC},grid:{color:gridC}}}}}));
}
window.setAdsetCampaign=function(v){ window._adsetCamp=parseInt(v); destroyCharts(); renderAdsets(window._adsetDay); };

var _heatDay=null, heatFilter='all';
window.setHeatFilter=function(v){heatFilter=v; if(_heatDay) renderHeatmap(_heatDay);};
function renderHeatmap(d){
  _heatDay=d;
  const cols=d.day_labels;
  const head=`<th class="hcorner">Campanha</th>`+cols.map(c=>`<th class="hday">${c}</th>`).join('')+`<th class="hmonth">Mês</th>`;
  let rowsF=d.rows;
  if(heatFilter==='direct') rowsF=d.rows.filter(r=>String(r.id).startsWith('DIR'));
  else if(heatFilter==='chatbot') rowsF=d.rows.filter(r=>!String(r.id).startsWith('DIR'));
  const body=rowsF.map(r=>{
    const cells=r.roi.map((v,i)=>{
      if(v!==null && v!==undefined){const c=roiColor(v);return `<td class="hcell" style="background:${c.bg};color:${c.fg}">${c.txt}</td>`;}
      const sp=r.spend||[]; const hadBefore=sp.slice(0,i).some(s=>s>0); const spentNow=(sp[i]||0)>0;
      if(hadBefore && !spentNow){return `<td class="hcell" title="Pausada (sem gasto após rodar)" style="background:rgba(148,163,184,.18);color:#cbd5e1">⏸</td>`;}
      return `<td class="hcell" style="background:rgba(100,116,139,.12);color:#5b6b85">—</td>`;
    }).join('');
    const cm=roiColor(r.roi_month);
    const susp=r.suspended?` <span style="color:#e0625e;opacity:.75;font-size:10px;font-weight:700;border:1px solid rgba(224,98,94,.5);border-radius:4px;padding:1px 5px;white-space:nowrap">⛔ suspensa</span>`:'';
    return `<tr><td class="hname" title="${r.name}">${r.name}${susp}</td>${cells}<td class="hcell hmonth" style="background:${cm.bg};color:${cm.fg};font-weight:700">${cm.txt}</td></tr>`;
  }).join('');
  document.getElementById('wrap').innerHTML=`
    <div class="notice blue">🔥 <b>Histórico de ROI por campanha</b> — cada célula é o ROI do dia (verde = lucro alto, vermelho = prejuízo). Ordenado pelo ROI do mês. Células <b>⏸</b> = campanha pausada (rodou antes e zerou o gasto); <b>—</b> = sem dado / nunca rodou.</div>
    <div style="margin:0 0 12px;display:flex;align-items:center;gap:8px">
      <label style="color:var(--muted);font-size:13px">Filtrar:</label>
      <select onchange="setHeatFilter(this.value)" style="background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer">
        <option value="all"${heatFilter==='all'?' selected':''}>Todas as campanhas</option>
        <option value="chatbot"${heatFilter==='chatbot'?' selected':''}>Somente Chatbot</option>
        <option value="direct"${heatFilter==='direct'?' selected':''}>Somente Tráfego Direto</option>
      </select>
      <span style="color:var(--muted);font-size:12px">(${rowsF.length} campanhas)</span>
    </div>
    <div class="heatwrap"><table class="heat">
      <thead><tr>${head}</tr></thead><tbody>${body}</tbody>
    </table></div>
    <div class="legend">
      <span class="lg" style="background:#e0625e"></span><span>Negativo</span>
      <span class="lg" style="background:#f2c14e"></span><span>0–50%</span>
      <span class="lg" style="background:#1f9d57"></span><span>&gt; 50%</span>
      <span style="margin-left:10px;color:#cbd5e1">⏸</span><span>Pausada</span>
      <span style="margin-left:10px;color:#5b6b85">—</span><span>Sem dado</span>
    </div>`;
}
function render(idx){
  const _d=DASHBOARD.days[idx];
  document.querySelectorAll('.tab').forEach((x,i)=>x.classList.toggle('active',i===idx));
  destroyCharts();
  if(_d.is_heatmap){ renderHeatmap(_d); return; }
  if(_d.is_adsets){ renderAdsets(_d); return; }
  const d=DASHBOARD.days[idx];const t=d.totals;const msg=d.is_messaging;
  const lucroCls=t.lucro>=0?'pos':'neg',roiCls=(t.roi===null)?'':(t.roi>=0?'pos':'neg');
  let kpis=`
   <div class="kpi"><div class="lab">Gasto FB (bruto)</div><div class="val">${brl(t.spend)}</div><div class="sub">Custo +13%: ${brl(t.custo_adj)}</div></div>
   <div class="kpi"><div class="lab">Ganho AdX (bruto)</div><div class="val">${brl(t.ganho)}</div><div class="sub">Ganho −10%: ${brl(t.ganho_adj)}</div></div>
   <div class="kpi"><div class="lab">Lucro do dia</div><div class="val ${lucroCls}">${brl(t.lucro)}</div><div class="sub">ganho−10% − custo+13%</div></div>
   <div class="kpi"><div class="lab">ROI geral</div><div class="val ${roiCls}">${pct(t.roi)}</div><div class="sub">lucro ÷ custo+13%</div></div>
   <div class="kpi"><div class="lab">Campanhas no lucro</div><div class="val">${t.n_lucro}<span class="muted" style="font-size:15px">/${t.n_total}</span></div><div class="sub">${(100*t.n_lucro/t.n_total).toFixed(0)}% positivas</div></div>
   <div class="kpi"><div class="lab">RPM médio (AdX)</div><div class="val">${brl(t.rpm)}</div><div class="sub">receita ÷ impr AdX ×1000</div></div>`;
  if(msg){kpis+=`
   <div class="kpi"><div class="lab">Contatos (mensagem)</div><div class="val">${num(t.contatos)}</div><div class="sub">conversas iniciadas</div></div>
   <div class="kpi"><div class="lab">Custo médio / contato</div><div class="val">${brl(t.cpc_contato)}</div><div class="sub">gasto ÷ contatos</div></div>`;}
  let notice='';
  if(d.is_monthly){notice+=`<div class="notice blue">📅 <b>Visão mensal</b> — ROI acumulado por campanha. ${d.period_note||''}</div>`;}
  if(d.date_mismatch){notice+=`<div class="notice">⚠️ <b>Atenção — datas diferentes:</b> a planilha do Facebook é de <b>${d.fb_date}</b>, mas o relatório do Google Ad Manager é de <b>${d.adx_date}</b>. O ROI cruza custo e receita de dias distintos. ${t.n_unmatched>0?`<b>${t.n_unmatched} campanha(s)</b> não têm página correspondente no AdX (ganho R$ 0) — provavelmente por rodarem em data sem receita no relatório. Para ROI exato, envie o relatório do AdX do mesmo dia.`:''}</div>`;}
  if(d.partial){notice+=`<div class="notice">⏳ Dia ainda aberto: a receita do AdX está acumulando — o ROI tende a melhorar.</div>`;}
  if(d.costs_zero){notice+=`<div class="notice">💸 <b>Custos do Meta zerados</b> neste relatório (gasto R$ 0 em todas as campanhas) — comum em parcial cedo no dia. Lucro = ganho ajustado; <b>ROI fica indefinido</b> (sem custo) e aparece como "—". Reenvie quando o gasto popular.</div>`;}
  notice+=`<div class="notice blue">ℹ️ Receita = coluna "Receita total de CPM e de CPC" do GAM (export sem coluna específica de Ad Exchange). Impressões AdX = "Total de impressões". ID da página = nº de 4 dígitos do nome da campanha = últimos 4 dígitos do ID na utm_source (facecap_/facebroad_).</div>`;

  const rows=d.campaigns.map(c=>{
    const rc=(c.roi===null)?'':(c.roi>=0?'b-green':'b-red'),lc=c.lucro>=0?'pos':'neg';
    const zero=c.matched===false?'zero':'';
    const flag=c.matched===false?' <span class="badge b-red" title="sem página no AdX">s/ AdX</span>':'';
    let extra=msg?`<td>${num(c.contatos)}</td><td>${brl(c.cpc_contato)}</td>`:'';
    return `<tr class="${zero}"><td title="${c.name}">${c.name}${flag}</td><td class="muted">${c.id}</td>
      <td>${brl(c.spend)}</td><td>${brl(c.custo_adj)}</td><td>${brl(c.cap_rev)}</td><td>${brl(c.broad_rev)}</td>
      <td>${brl(c.ganho)}</td><td>${brl(c.ganho_adj)}</td><td class="${lc}">${brl(c.lucro)}</td>
      <td><span class="badge ${rc}">${pct(c.roi)}</span></td>${extra}<td>${brl(c.rpm)}</td></tr>`;}).join('');
  const totExtra=msg?`<td>${num(t.contatos)}</td><td>${brl(t.cpc_contato)}</td>`:'';
  const totalRow=`<tr class="total"><td>TOTAL (${t.n_total} camp.)</td><td></td>
     <td>${brl(t.spend)}</td><td>${brl(t.custo_adj)}</td><td>${brl(t.cap_rev)}</td><td>${brl(t.broad_rev)}</td>
     <td>${brl(t.ganho)}</td><td>${brl(t.ganho_adj)}</td><td class="${lucroCls}">${brl(t.lucro)}</td>
     <td>${pct(t.roi)}</td>${totExtra}<td>${brl(t.rpm)}</td></tr>`;
  const msgHead=msg?'<th>Contatos</th><th>R$/contato</th>':'';

  const cbSorted=[...d.campaigns].sort((a,b)=>a.name.localeCompare(b.name,"pt",{numeric:true,sensitivity:"base"}));
  const cbRows=cbSorted.map(c=>{const tot=c.cap_rev+c.broad_rev,sp=tot?100*c.cap_rev/tot:0;
    return `<tr><td title="${c.name}">${c.name}</td><td class="muted">${c.id}</td>
     <td>${brl(c.spend)}</td><td>${brl(c.cap_rev)}</td><td>${brl(c.broad_rev)}</td><td>${brl(tot)}</td>
     <td>${sp.toFixed(0)}% / ${(100-sp).toFixed(0)}%</td></tr>`;}).join('');
  const cbTotal=`<tr class="total"><td>TOTAL</td><td></td><td>${brl(t.spend)}</td><td>${brl(t.cap_rev)}</td><td>${brl(t.broad_rev)}</td>
     <td>${brl(t.cap_rev+t.broad_rev)}</td><td>${t.cap_split}% / ${t.broad_split}%</td></tr>`;

  document.getElementById('wrap').innerHTML=`${notice}<div class="kpis">${kpis}</div>
   <div class="grid2">
     <div class="card"><h3>ROI por campanha (%)</h3><div class="chart-box"><canvas id="roiChart"></canvas></div></div>
     <div class="card"><h3>Custo (+13%) × Ganho (−10%) por campanha</h3><div class="chart-box"><canvas id="cgChart"></canvas></div></div>
   </div>
   <div class="card full" style="margin-bottom:20px"><h3>Detalhamento por campanha</h3>
     <div class="scroll"><table><thead><tr>
       <th>Campanha</th><th>Página (ID)</th><th>Gasto FB</th><th>Custo +13%</th><th>Receita CAP</th><th>Receita BROAD</th>
       <th>Ganho bruto</th><th>Ganho −10%</th><th>Lucro</th><th>ROI</th>${msgHead}<th>RPM</th>
     </tr></thead><tbody>${rows}${totalRow}</tbody></table></div></div>
   <div class="grid2">
     <div class="card"><h3>CAP × BROAD — receita empilhada</h3><div class="chart-box"><canvas id="cbChart"></canvas></div></div>
     <div class="card"><h3>CAP × BROAD — tabela</h3><div class="scroll" style="max-height:420px"><table>
       <thead><tr><th>Campanha</th><th>ID</th><th>Gasto FB</th><th>CAP</th><th>BROAD</th><th>Total</th><th>Split %</th></tr></thead>
       <tbody>${cbRows}${cbTotal}</tbody></table></div></div>
   </div>` + (d.direct ? directSection(d) : '');

  if(d.direct){ buildDirectChart(d); }
  const gridC='#2a3550',tickC='#94a3b8';
  const base={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:tickC}}},
    scales:{x:{ticks:{color:tickC,maxRotation:90,minRotation:90,font:{size:9}},grid:{color:gridC}},y:{ticks:{color:tickC},grid:{color:gridC}}}};
  const roiS=[...d.campaigns].sort((a,b)=>b.roi-a.roi);
  charts.push(new Chart(roiChart,{type:'bar',data:{labels:roiS.map(c=>c.id),
    datasets:[{label:'ROI %',data:roiS.map(c=>c.roi),backgroundColor:roiS.map(c=>c.roi>=0?'#22c55e':'#ef4444')}]},
    options:{...base,plugins:{legend:{display:false},tooltip:{callbacks:{title:i=>roiS[i[0].dataIndex].name,label:x=>'ROI: '+pct(x.raw)}}}}}));
  const cg=[...d.campaigns].sort((a,b)=>b.ganho_adj-a.ganho_adj);
  charts.push(new Chart(cgChart,{type:'bar',data:{labels:cg.map(c=>c.id),
    datasets:[{label:'Custo +13%',data:cg.map(c=>c.custo_adj),backgroundColor:'#ef4444'},
              {label:'Ganho −10%',data:cg.map(c=>c.ganho_adj),backgroundColor:'#22c55e'}]},
    options:{...base,plugins:{...base.plugins,tooltip:{callbacks:{title:i=>cg[i[0].dataIndex].name,label:x=>x.dataset.label+': '+brl(x.raw)}}}}}));
  const cb=[...d.campaigns].sort((a,b)=>(b.cap_rev+b.broad_rev)-(a.cap_rev+a.broad_rev));
  charts.push(new Chart(cbChart,{type:'bar',data:{labels:cb.map(c=>c.id),
    datasets:[{label:'CAP',data:cb.map(c=>c.cap_rev),backgroundColor:'#3b82f6'},
              {label:'BROAD',data:cb.map(c=>c.broad_rev),backgroundColor:'#a855f7'}]},
    options:{...base,scales:{x:{stacked:true,ticks:{color:tickC,maxRotation:90,minRotation:90,font:{size:9}},grid:{color:gridC}},
      y:{stacked:true,ticks:{color:tickC},grid:{color:gridC}}},
      plugins:{...base.plugins,tooltip:{callbacks:{title:i=>cb[i[0].dataIndex].name,label:x=>x.dataset.label+': '+brl(x.raw)}}}}}));
}
const tabsEl=document.getElementById('tabs');
DASHBOARD.days.forEach((d,i)=>{const b=document.createElement('div');b.className='tab';b.textContent=d.label;b.onclick=()=>render(i);tabsEl.appendChild(b);});
render(DASHBOARD.days.length-1);
</script>
</body></html>
